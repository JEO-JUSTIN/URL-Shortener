<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Shortener</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: #334155;
            --border-radius: 12px;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(15, 23, 42, 0) 50%);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            background-color: var(--card-bg);
            padding: 3rem;
            border-radius: var(--border-radius);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-2px);
            box-shadow: 0 30px 60px -12px rgba(99, 102, 241, 0.2);
        }

        h1 {
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-weight: 300;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .input-group {
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        input[type="url"] {
            width: 100%;
            padding: 1rem;
            border-radius: var(--border-radius);
            border: 1px solid transparent;
            background: var(--input-bg);
            color: white;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
            outline: none;
        }

        input[type="url"]:focus {
            border-color: var(--primary);
            background: #475569;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        button.submit-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: white;
            border: none;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.3);
        }

        button.submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        button.submit-btn:active {
            transform: translateY(1px);
        }

        /* Result Area */
        .result-container {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.5s ease-out;
        }

        .result-box {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px;
            border-radius: var(--border-radius);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-box input {
            background: transparent;
            border: none;
            color: var(--primary);
            flex-grow: 1;
            font-family: monospace;
            font-size: 1.1rem;
            padding: 0 10px;
            outline: none;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 500;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                margin: 20px;
                padding: 2rem;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Shorten Link</h1>
        <p class="subtitle">Paste your long URL below to shorten it.</p>

        <form method="POST">
            <div class="input-group">
                <label for="url">Destination URL</label>
                <input type="url" id="url" name="url" placeholder="https://example.com/very-long-link" required
                    autocomplete="off">
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Shorten Link</button>
        </form>

        {% if encoded %}
        <div class="result-container">
            <label style="text-align: left; margin-bottom: 0.5rem;">Your Short Link</label>
            <div class="result-box">
                <input type="text" value="http://localhost:5001/{{ encoded }}" id="shortUrl" readonly>
                <button class="copy-btn" onclick="copyToClipboard()" id="copyBtn">Copy</button>
            </div>
        </div>
        <script>
            function copyToClipboard() {
                var copyText = document.getElementById("shortUrl");
                copyText.select();
                copyText.setSelectionRange(0, 99999);
                navigator.clipboard.writeText(copyText.value).then(() => {
                    const btn = document.getElementById("copyBtn");
                    const originalText = btn.innerText;
                    btn.innerText = "Copied!";
                    btn.classList.add("copied");
                    setTimeout(() => {
                        btn.innerText = originalText;
                        btn.classList.remove("copied");
                    }, 2000);
                });
            }
        </script>
        {% endif %}
    </div>

</body>

</html>
